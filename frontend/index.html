<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthArena — Multi-Agent Fact-Check Debate Platform</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM (Production CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (for JSX in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets['react'], { runtime: 'classic' }]
      ]
    });
  </script>

  <style>
    :root {
      --bg-main: #070a13;
      --bg-card: rgba(15, 23, 42, 0.6);
      --bg-card-hover: rgba(30, 41, 59, 0.8);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-color-glow: rgba(99, 102, 241, 0.3);
      --color-text: #f8fafc;
      --color-text-muted: #94a3b8;
      
      --color-primary: #6366f1;
      --color-primary-glow: rgba(99, 102, 241, 0.15);
      
      --color-for: #06b6d4;
      --color-for-glow: rgba(6, 182, 212, 0.15);
      --color-for-bg: rgba(6, 182, 212, 0.05);
      
      --color-against: #f43f5e;
      --color-against-glow: rgba(244, 63, 94, 0.15);
      --color-against-bg: rgba(244, 63, 94, 0.05);
      
      --color-judge: #f59e0b;
      --color-judge-glow: rgba(245, 158, 11, 0.15);
      --color-judge-bg: rgba(245, 158, 11, 0.05);

      --font-title: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'Fira Code', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--color-text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(244, 63, 94, 0.04) 0%, transparent 50%);
      background-attachment: fixed;
    }

    /* Scrollbar Style */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.3);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Global Typography & Utilities */
    h1, h2, h3, h4, h5 {
      font-family: var(--font-title);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Glassmorphism Classes */
    .glass-panel {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-panel:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    }

    .glass-input {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 1rem;
      padding: 12px 16px;
      transition: all 0.2s ease;
    }

    .glass-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 10px var(--color-primary-glow);
    }

    .btn {
      font-family: var(--font-title);
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--color-primary) 0%, #4f46e5 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--color-text);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-for {
      background: var(--color-for-glow);
      color: var(--color-for);
      border: 1px solid rgba(6, 182, 212, 0.3);
    }

    .badge-against {
      background: var(--color-against-glow);
      color: var(--color-against);
      border: 1px solid rgba(244, 63, 94, 0.3);
    }

    .badge-judge {
      background: var(--color-judge-glow);
      color: var(--color-judge);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    /* Fallacy Highlighting Styles */
    .fallacy-highlight {
      cursor: help;
      border-bottom: 2px dashed #f59e0b;
      background-color: rgba(245, 158, 11, 0.1);
      transition: all 0.2s ease;
      position: relative;
    }

    .fallacy-highlight:hover {
      background-color: rgba(245, 158, 11, 0.25);
      color: #fff;
    }

    .fallacy-tooltip-box {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #1e1b4b;
      border: 1px solid #f59e0b;
      padding: 10px 14px;
      border-radius: 8px;
      width: 250px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      z-index: 100;
      font-size: 0.8rem;
      line-height: 1.4;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      color: #f1f5f9;
      text-align: left;
    }

    .fallacy-tooltip-box strong {
      color: #fbbf24;
      display: block;
      margin-bottom: 4px;
      font-size: 0.85rem;
    }

    .fallacy-highlight:hover .fallacy-tooltip-box {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    /* Pulsing animations */
    @keyframes pulse-glow-for {
      0%, 100% { box-shadow: 0 0 5px rgba(6, 182, 212, 0.2); }
      50% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
    }

    @keyframes pulse-glow-against {
      0%, 100% { box-shadow: 0 0 5px rgba(244, 63, 94, 0.2); }
      50% { box-shadow: 0 0 20px rgba(244, 63, 94, 0.5); }
    }

    @keyframes pulse-glow-judge {
      0%, 100% { box-shadow: 0 0 5px rgba(245, 158, 11, 0.2); }
      50% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
    }

    .pulse-for { animation: pulse-glow-for 2s infinite; border-color: rgba(6, 182, 212, 0.4); }
    .pulse-against { animation: pulse-glow-against 2s infinite; border-color: rgba(244, 63, 94, 0.4); }
    .pulse-judge { animation: pulse-glow-judge 2s infinite; border-color: rgba(245, 158, 11, 0.4); }

    /* Custom layout styling */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--color-for) 0%, var(--color-primary) 50%, var(--color-against) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: var(--font-title);
      font-weight: 800;
    }

    .logo-badge {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      color: var(--color-text-muted);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* Grid layouts */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 1024px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Info panels and controls */
    .control-section {
      padding: 20px;
      margin-bottom: 20px;
    }

    .control-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Sliders and radio toggles */
    .slider-group {
      margin-bottom: 16px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }

    .custom-slider {
      width: 100%;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }

    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--color-primary);
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .custom-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .mode-toggle-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 4px;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    .mode-option {
      padding: 8px;
      text-align: center;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--color-text-muted);
    }

    .mode-option.active {
      background: var(--color-primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    /* Claim Presets */
    .preset-chip {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      margin-bottom: 8px;
      width: 100%;
      display: block;
      color: var(--color-text);
    }

    .preset-chip:hover {
      background: rgba(99, 102, 241, 0.08);
      border-color: rgba(99, 102, 241, 0.3);
      transform: translateX(4px);
    }

    /* Live logs */
    .log-panel {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      padding: 12px;
      height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
    }

    .log-entry {
      margin-bottom: 6px;
      line-height: 1.4;
      display: flex;
      gap: 6px;
    }

    .log-timestamp {
      color: #64748b;
      flex-shrink: 0;
    }

    .log-text-system { color: #94a3b8; }
    .log-text-for { color: #22d3ee; }
    .log-text-against { color: #f43f5e; }
    .log-text-judge { color: #fbbf24; }

    /* Debate Screen Elements */
    .arena-header {
      margin-bottom: 24px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .claim-title-card {
      font-size: 1.4rem;
      font-family: var(--font-title);
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .claim-quote-mark {
      color: var(--color-primary);
      font-size: 2rem;
      line-height: 1;
      font-family: serif;
    }

    /* Confidence Meter */
    .meter-container {
      margin-top: 16px;
    }

    .meter-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .meter-bar-outer {
      height: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
    }

    .meter-bar-for {
      background: linear-gradient(90deg, #0e7490 0%, var(--color-for) 100%);
      height: 100%;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .meter-bar-against {
      background: linear-gradient(90deg, var(--color-against) 0%, #be123c 100%);
      height: 100%;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .meter-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255, 255, 255, 0.3);
      left: 50%;
    }

    /* Debate columns layout */
    .debate-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .debate-columns {
        grid-template-columns: 1fr;
      }
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
    }

    .avatar-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .agent-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
    }

    .avatar-for {
      background: rgba(6, 182, 212, 0.15);
      color: var(--color-for);
      border: 1px solid rgba(6, 182, 212, 0.3);
    }

    .avatar-against {
      background: rgba(244, 63, 94, 0.15);
      color: var(--color-against);
      border: 1px solid rgba(244, 63, 94, 0.3);
    }

    /* Bubble lists */
    .speech-bubble-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      min-height: 200px;
    }

    .speech-bubble {
      padding: 16px;
      border-radius: 12px;
      position: relative;
      line-height: 1.5;
      font-size: 0.95rem;
      animation: fadeIn 0.4s ease-out forwards;
      background: rgba(15, 23, 42, 0.35);
      border: 1px solid var(--border-color);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .speech-bubble.for-type {
      border-left: 4px solid var(--color-for);
    }

    .speech-bubble.against-type {
      border-left: 4px solid var(--color-against);
    }

    .bubble-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--color-text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    /* Verdict Card (Dramatic presentation) */
    .verdict-backdrop {
      animation: expandIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      border: 1px solid rgba(245, 158, 11, 0.25);
      overflow: hidden;
      margin-top: 24px;
    }

    @keyframes expandIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .verdict-header {
      background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%);
      padding: 20px 24px;
      border-bottom: 1px solid rgba(245, 158, 11, 0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .verdict-score-ring-row {
      display: flex;
      justify-content: space-around;
      gap: 20px;
      padding: 24px;
      border-bottom: 1px solid var(--border-color);
    }

    .score-circle-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .score-gauge-big {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 3px solid var(--border-color);
    }

    .score-value-big {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: var(--font-title);
    }

    .gauge-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Fallacy lists */
    .fallacy-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .fallacy-badge-tag {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Thinking State */
    .thinking-placeholder {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--color-text-muted);
      font-size: 0.85rem;
      font-style: italic;
    }

    .dot-typing {
      display: inline-flex;
      gap: 4px;
    }

    .dot-typing span {
      width: 6px;
      height: 6px;
      background-color: var(--color-text-muted);
      border-radius: 50%;
      animation: dotPulse 1.4s infinite ease-in-out both;
    }

    .dot-typing span:nth-child(1) { animation-delay: -0.32s; }
    .dot-typing span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .alert-panel {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .alert-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    .api-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot-active { background: #10b981; box-shadow: 0 0 8px #10b981; }
    .status-dot-inactive { background: #64748b; }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- React code with Babel -->
  <script type="text/babel" data-presets="react-classic">
    /** @jsxRuntime classic */
    const { useState, useEffect, useRef } = React;

    // Direct SVGs for premium look & independence from icon libraries
    const Icons = {
      Swords: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/><polyline points="14.5 6.5 21 13 21 16 18 16 6.5 4.5"/><line x1="5" y1="5" x2="9" y2="9"/><line x1="3" y1="21" x2="21" y2="3"/></svg>
      ),
      Cpu: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>
      ),
      Gavel: () => (

    const SIMULATION_DATA = {

    // Generic simulated responses for custom claims entered by user
    function generateDynamicSimulation(claim, roundsCount, forPersona, againstPersona) {
      const isAggressiveFor = forPersona > 60;
      const isFactHeavyAgainst = againstPersona > 60;

      const forOpeners = [
        `I believe the claim "${claim}" is clearly true, and here's why. The evidence overwhelmingly points in one direction.`,
        `Let me explain why I'm convinced the claim "${claim}" is right. The logic is straightforward when you look at the facts.`,
        `I'm going to argue that "${claim}" is absolutely correct. My opponent will try to muddy the waters, but the truth is clear.`
      ];
      const forRebuttals = [
        `My opponent makes a decent point, but they're overlooking something crucial. The claim "${claim}" isn't just plausible — it's the only logical conclusion once you consider the broader picture.`,
        `I hear what my opponent is saying, but I think they've missed the mark here. The claim "${claim}" stands up to scrutiny precisely because of the evidence they chose to ignore.`,
        `My opponent's argument sounds reasonable on the surface, but it falls apart when you dig deeper. The claim "${claim}" is correct, and I'll tell you exactly why their counter-argument doesn't hold water.`
      ];
      const againstOpeners = [
        `I respectfully disagree with the claim "${claim}". Here's why I think it's fundamentally wrong.`,
        `Let me explain why I believe the claim "${claim}" doesn't hold up. The problems start with the basic assumptions.`,
        `I'm going to argue that "${claim}" is mistaken. My opponent will present a nice story, but the reality is much more complicated.`
      ];
      const againstRebuttals = [
        `My opponent makes a good case, but I think they've overlooked some critical flaws. The claim "${claim}" simply doesn't work when you test it against real-world evidence.`,
        `I see where my opponent is coming from, but they're painting an incomplete picture. The claim "${claim}" fails because of the very factors they've conveniently left out.`,
        `My opponent's argument sounds compelling, but it's built on shaky ground. The claim "${claim}" falls apart once you apply basic critical thinking.`
      ];

      const rounds = [];
      for (let i = 0; i < roundsCount; i++) {
        const forText = i === 0
          ? forOpeners[i % forOpeners.length]
          : forRebuttals[i % forRebuttals.length];
        const againstText = i === 0
          ? againstOpeners[i % againstOpeners.length]
          : againstRebuttals[i % againstRebuttals.length];

        rounds.push({ for: forText, against: againstText });
      }

      if (rounds.length >= 2) {
        rounds[1].for += ` In fact, my opponent is creating a <span class='fallacy-highlight'>false dilemma<span class='fallacy-tooltip-box'><strong>False Dilemma Fallacy</strong>Presenting only two extreme options as if no middle ground exists.</span></span> by pretending we have to choose between two extremes. The real world is more nuanced, and the claim accommodates that nuance.`;
        rounds[1].against += ` I'd argue my opponent is sliding down a <span class='fallacy-highlight'>slippery slope<span class='fallacy-tooltip-box'><strong>Slippery Slope Fallacy</strong>Assuming a small first step inevitably leads to an extreme outcome without evidence.</span></span> — assuming that accepting any part of their position means accepting the whole thing, consequences and all.`;
      }

      return {
        rounds,
        verdict: {
          for_score: Math.floor(Math.random() * 3) + 6,
          against_score: Math.floor(Math.random() * 3) + 6,
          fallacies_detected: [
            { agent: "FOR", name: "False Dilemma", detail: "Presenting only two extreme options as if no middle ground exists." },
            { agent: "AGAINST", name: "Slippery Slope", detail: "Assuming a small first step inevitably leads to an extreme outcome." }
          ],
          verdict: "Verdict Declared",
          reasoning: `After reviewing the debate on "${claim}", I found both sides made compelling cases. The FOR agent argued from conviction, while the AGAINST agent countered with skepticism. Both committed minor logical missteps. The final scores reflect a closely contested debate.`
        }
      };
    }

    function App() {
      const [claim, setClaim] = useState("");
      const [numRounds, setNumRounds] = useState(3);
      const [forPersona, setForPersona] = useState(50);
      const [againstPersona, setAgainstPersona] = useState(50);
      const [mode, setMode] = useState("simulate"); // "simulate" or "backend"
      
      const [debateActive, setDebateActive] = useState(false);
      const [currentRoundIndex, setCurrentRoundIndex] = useState(-1);
      const [displayedRounds, setDisplayedRounds] = useState([]);
      const [activeAgent, setActiveAgent] = useState(""); // "FOR", "AGAINST", "JUDGE", ""
      const [logs, setLogs] = useState([]);
      const [confidence, setConfidence] = useState(50); // FOR vs AGAINST split (percentage for FOR)
      const [verdict, setVerdict] = useState(null);
      const [loading, setLoading] = useState(false);
      const [backendError, setBackendError] = useState("");

      const logEndRef = useRef(null);

      // Scroll to bottom of log panel when a log is added
      useEffect(() => {
        if (logEndRef.current) {
          logEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [logs]);

      const addLog = (text, type = "system") => {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        setLogs(prev => [...prev, { timestamp, text, type }]);
      };

      const handlePresetClick = (presetText) => {
        setClaim(presetText);
      };

      const runClientSimulation = async (selectedClaim) => {
        setDebateActive(true);
        setDisplayedRounds([]);
        setVerdict(null);
        setConfidence(50);
        setBackendError("");
        
        let debateData = SIMULATION_DATA[selectedClaim];
        if (!debateData) {
          debateData = generateDynamicSimulation(selectedClaim, numRounds, forPersona, againstPersona);
        }

        const actualRounds = debateData.rounds.slice(0, numRounds);
        
        addLog(`Initiating debate session for claim: "${selectedClaim}"`, "system");
        addLog(`Configuring Agent FOR: Gemini 2.5 Flash (${forPersona}% Aggressiveness)`, "for");
        addLog(`Configuring Agent AGAINST: Llama 3.3 70B (${againstPersona}% Fact-Density)`, "against");
        addLog(`Configuring Judge: DeepSeek R1`, "judge");

        for (let i = 0; i < actualRounds.length; i++) {
          setCurrentRoundIndex(i);
          
          // FOR Agent Turn
          setActiveAgent("FOR");
          addLog(`Round ${i+1} - Agent FOR is executing web search...`, "for");
          await delay(1200);
          addLog(`Round ${i+1} - Agent FOR is drafting response...`, "for");
          await delay(1500);
          
          const newRoundData = {
            for: actualRounds[i].for,
            against: ""
          };
          
          setDisplayedRounds(prev => [...prev, newRoundData]);
          addLog(`Round ${i+1} - Agent FOR published arguments.`, "for");
          
          // Adjust confidence slightly in favor of FOR
          setConfidence(prev => Math.min(85, Math.max(15, prev + (Math.random() * 12 + 4))));
          await delay(1000);

          // AGAINST Agent Turn
          setActiveAgent("AGAINST");
          addLog(`Round ${i+1} - Agent AGAINST is searching opponent's text for logic errors...`, "against");
          await delay(1200);
          addLog(`Round ${i+1} - Agent AGAINST is generating rebuttal...`, "against");
          await delay(1500);

          setDisplayedRounds(prev => {
            const updated = [...prev];
            updated[i].against = actualRounds[i].against;
            return updated;
          });
          addLog(`Round ${i+1} - Agent AGAINST published rebuttal.`, "against");
          
          // Adjust confidence in favor of AGAINST
          setConfidence(prev => Math.min(85, Math.max(15, prev - (Math.random() * 12 + 6))));
          await delay(1000);
        }

        // Judge phase
        setActiveAgent("JUDGE");
        addLog(`Gathering all transcripts and logs for review...`, "judge");
        await delay(1200);
        addLog(`DeepSeek R1 is analyzing structural logic and checking fallacies...`, "judge");
        await delay(2000);
        addLog(`Judge has delivered final verdict!`, "judge");
        
        setVerdict(debateData.verdict);
        // Set final confidence mapping to scores
        const forScore = debateData.verdict.for_score;
        const againstScore = debateData.verdict.against_score;
        setConfidence(Math.round((forScore / (forScore + againstScore)) * 100));
        setActiveAgent("");
      };

      const runLiveBackend = async (selectedClaim) => {
        setLoading(true);
        setDebateActive(true);
        setDisplayedRounds([]);
        setVerdict(null);
        setConfidence(50);
        setBackendError("");

        addLog(`Sending API Request to FastAPI backend at http://localhost:8000/debate...`, "system");
        addLog(`Claim: "${selectedClaim}" | Rounds: ${numRounds}`, "system");

        try {
          const res = await fetch("http://localhost:8000/debate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ claim: selectedClaim, num_rounds: numRounds })
          });

          if (!res.ok) {
            throw new Error(`HTTP error! status: ${res.status}`);
          }

          const data = await res.json();
          addLog(`Backend successfully generated debate! Loading transcripts...`, "system");
          
          for (let i = 0; i < data.rounds.length; i++) {
            setActiveAgent("FOR");
            setDisplayedRounds(prev => [...prev, {
              for: data.rounds[i].for,
              against: ""
            }]);
            addLog(`Round ${i+1} - Agent FOR published arguments.`, "for");
            await delay(800);

            setActiveAgent("AGAINST");
            await delay(600);
            setDisplayedRounds(prev => {
              const updated = [...prev];
              updated[i].against = data.rounds[i].against;
              return updated;
            });
            addLog(`Round ${i+1} - Agent AGAINST published rebuttal.`, "against");
            await delay(800);
          }

          setActiveAgent("JUDGE");
          addLog(`Judge is analyzing all arguments for logical fallacies...`, "judge");
          await delay(1200);

          if (data.verdict) {
            // Conform backend format if it is raw strings or custom shaped
            let cleanVerdict = data.verdict;
            if (typeof data.verdict === 'string') {
              try {
                cleanVerdict = JSON.parse(data.verdict);
              } catch (e) {
                cleanVerdict = {
                  verdict: "Verdict Decided",
                  reasoning: data.verdict,
                  for_score: 5,
                  against_score: 5,
                  fallacies_detected: []
                };
              }
            }
            
            // Format fallacies for frontend view
            const mappedFallacies = [];
            if (cleanVerdict.fallacies_detected) {
              if (Array.isArray(cleanVerdict.fallacies_detected)) {
                cleanVerdict.fallacies_detected.forEach(f => {
                  mappedFallacies.push({ agent: "DEBATER", name: f, detail: "Identified by Judge" });
                });
              } else if (typeof cleanVerdict.fallacies_detected === 'object') {
                Object.entries(cleanVerdict.fallacies_detected).forEach(([k, v]) => {
                  mappedFallacies.push({ agent: k.toUpperCase(), name: v, detail: "Identified by Judge" });
                });
              }
            }

            setVerdict({
              for_score: cleanVerdict.for_score || 5,
              against_score: cleanVerdict.against_score || 5,
              fallacies_detected: mappedFallacies,
              verdict: cleanVerdict.verdict || "Verdict Decided",
              reasoning: cleanVerdict.reasoning || "Analyzed by backend judge."
            });
            
            const forScore = cleanVerdict.for_score || 5;
            const againstScore = cleanVerdict.against_score || 5;
            setConfidence(Math.round((forScore / (forScore + againstScore)) * 100));
            setActiveAgent("");
          }
        } catch (err) {
          addLog(`Backend communication failed: ${err.message}`, "system");
          setBackendError(`Could not connect to the local TruthArena backend at http://localhost:8000. Please make sure the FastAPI server is running with 'uvicorn main:app --reload' or switch to Simulation Mode.`);
          setDebateActive(false);
        } finally {
          setLoading(false);
        }
      };

      const startDebate = () => {
        if (!claim.trim()) return;
        if (mode === "simulate") {
          runClientSimulation(claim);
        } else {
          runLiveBackend(claim);
        }
      };

      const resetDebate = () => {
        setDebateActive(false);
        setDisplayedRounds([]);
        setVerdict(null);
        setConfidence(50);
        setCurrentRoundIndex(-1);
        setActiveAgent("");
        setLogs([]);
        setBackendError("");
      };

      const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      return (
        <div className="app-container">
          {/* Header */}
          <header className="header-logo">
            <div className="logo-icon">TruthArena</div>
            <div className="logo-badge">GENAI WORKSPACE</div>
            <div style={{ marginLeft: 'auto' }} className="api-status-badge">
              <span className={`status-dot ${mode === 'backend' ? 'status-dot-active' : 'status-dot-inactive'}`}></span>
              <span>{mode === 'backend' ? 'Live Server Mode' : 'Sandbox Simulator'}</span>
            </div>
          </header>

          {backendError && (
            <div className="alert-panel alert-danger">
              <Icons.AlertCircle />
              <div>
                <strong>Connection Error:</strong> {backendError}
                <button 
                  className="btn btn-secondary" 
                  style={{ padding: '4px 10px', fontSize: '0.8rem', marginTop: '10px', display: 'block' }}
                  onClick={() => { setMode("simulate"); setBackendError(""); }}
                >
                  Switch to Sandbox Simulator
                </button>
              </div>
            </div>
          )}

          {!debateActive ? (
            /* Setup Screen */
            <div className="dashboard-grid">
              
              {/* Left Config Column */}
              <div className="glass-panel control-section">
                <div className="control-title">
                  <Icons.Sliders />
                  <span>Platform Config</span>
                </div>

                <div className="slider-group">
                  <label className="slider-header">
                    <span>Operation Mode</span>
                  </label>
                  <div className="mode-toggle-group">
                    <div 
                      className={`mode-option ${mode === "simulate" ? "active" : ""}`}
                      onClick={() => setMode("simulate")}
                    >
                      Simulator
                    </div>
                    <div 
                      className={`mode-option ${mode === "backend" ? "active" : ""}`}
                      onClick={() => setMode("backend")}
                    >
                      Live Backend
                    </div>
                  </div>
                </div>

                <div className="slider-group">
                  <label className="slider-header">
                    <span>Debate Rounds</span>
                    <span>{numRounds}</span>
                  </label>
                  <input 
                    type="range" 
                    min="1" 
                    max="5" 
                    value={numRounds} 
                    onChange={e => setNumRounds(parseInt(e.target.value))}
                    className="custom-slider"
                  />
                </div>

                <div className="slider-group" style={{ marginTop: '24px' }}>
                  <label className="slider-header">
                    <span>FOR Agent Persona</span>
                    <span>{forPersona > 60 ? "Aggressive" : forPersona < 40 ? "Empathetic" : "Balanced"}</span>
                  </label>
                  <input 
                    type="range" 
                    min="10" 
                    max="90" 
                    value={forPersona} 
                    onChange={e => setForPersona(parseInt(e.target.value))}
                    className="custom-slider"
                  />
                </div>

                <div className="slider-group">
                  <label className="slider-header">
                    <span>AGAINST Agent Persona</span>
                    <span>{againstPersona > 60 ? "Fact-Heavy" : againstPersona < 40 ? "Rhetorical" : "Dialectical"}</span>
                  </label>
                  <input 
                    type="range" 
                    min="10" 
                    max="90" 
                    value={againstPersona} 
                    onChange={e => setAgainstPersona(parseInt(e.target.value))}
                    className="custom-slider"
                  />
                </div>

                <div style={{ marginTop: '24px', borderTop: '1px solid var(--border-color)', paddingTop: '16px' }}>
                  <div className="control-title">
                    <Icons.Cpu />
                    <span>Assigned Models</span>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', fontSize: '0.85rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span style={{ color: 'var(--color-for)' }}>FOR:</span>
                      <span style={{ fontWeight: '500' }}>Gemini 2.5 Flash</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span style={{ color: 'var(--color-against)' }}>AGAINST:</span>
                      <span style={{ fontWeight: '500' }}>Llama 3.3 70B</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span style={{ color: 'var(--color-judge)' }}>JUDGE:</span>
                      <span style={{ fontWeight: '500' }}>DeepSeek R1</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Right Setup Input Panel */}
              <div className="glass-panel" style={{ padding: '32px' }}>
                <h2 style={{ fontSize: '1.8rem', marginBottom: '8px', display: 'flex', alignItems: 'center', gap: '10px' }}>
                  <Icons.Swords />
                  <span>Enter the TruthArena</span>
                </h2>
                <p style={{ color: 'var(--color-text-muted)', marginBottom: '24px', lineHeight: '1.5' }}>
                  Provide an argumentative claim. Opposing large language models will debate the topic, perform web evidence queries, and face a final structured judgment.
                </p>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '24px' }}>
                  <label style={{ fontSize: '0.85rem', fontWeight: '600', textTransform: 'uppercase', color: 'var(--color-text-muted)' }}>
                    Your Debate Claim
                  </label>
                  <div style={{ display: 'flex', gap: '12px' }}>
                    <input 
                      type="text" 
                      className="glass-input" 
                      style={{ flex: 1 }}
                      placeholder="e.g. Remote work increases productivity..."
                      value={claim}
                      onChange={e => setClaim(e.target.value)}
                    />
                    <button 
                      onClick={startDebate} 
                      disabled={!claim.trim() || loading}
                      className="btn btn-primary"
                    >
                      {loading ? (
                        <>
                          <Icons.RefreshCw />
                          <span>Connecting...</span>
                        </>
                      ) : (
                        <>
                          <Icons.Play />
                          <span>Start Debate</span>
                        </>
                      )}
                    </button>
                  </div>
                </div>

                <div>
                  <label style={{ display: 'block', fontSize: '0.85rem', fontWeight: '600', textTransform: 'uppercase', color: 'var(--color-text-muted)', marginBottom: '10px' }}>
                    Sample Claims to Debate
                  </label>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                    <button onClick={() => handlePresetClick("Remote work increases productivity")} className="preset-chip">
                      <strong>Remote Work:</strong> "Remote work increases productivity"
                    </button>
                    <button onClick={() => handlePresetClick("AI will create more jobs than it destroys")} className="preset-chip">
                      <strong>Artificial Intelligence:</strong> "AI will create more jobs than it destroys"
                    </button>
                    <button onClick={() => handlePresetClick("Standardized testing should be abolished")} className="preset-chip">
                      <strong>Education:</strong> "Standardized testing should be abolished"
                    </button>
                  </div>
                </div>
              </div>

            </div>
          ) : (
            /* Debate Arena Screen */
            <div>
              {/* Claim Title panel */}
              <div className="glass-panel arena-header">
                <div className="claim-title-card">
                  <span className="claim-quote-mark">“</span>
                  <span>{claim}</span>
                </div>
                
                {/* Confidence bar */}
                <div className="meter-container">
                  <div className="meter-labels">
                    <span style={{ color: 'var(--color-for)' }}>FOR (Gemini)</span>
                    <span style={{ color: 'var(--color-against)' }}>AGAINST (Llama)</span>
                  </div>
                  <div className="meter-bar-outer">
                    <div className="meter-bar-for" style={{ width: `${confidence}%` }}></div>
                    <div className="meter-bar-against" style={{ width: `${100 - confidence}%` }}></div>
                    <div className="meter-marker"></div>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: 'var(--color-text-muted)', marginTop: '4px' }}>
                    <span>{confidence}% persuasion score</span>
                    <span>{100 - confidence}% persuasion score</span>
                  </div>
                </div>
              </div>

              {/* Debate columns and layout */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: '24px', alignItems: 'start' }}>
                
                {/* Transcript stream */}
                <div>
                  <div className="debate-columns">
                    {/* FOR AGENT COLUMN */}
                    <div className={`glass-panel ${activeAgent === "FOR" ? "pulse-for" : ""}`}>
                      <div className="column-header">
                        <div className="avatar-wrapper">
                          <div className="agent-avatar avatar-for">G</div>
                          <div>
                            <div style={{ fontSize: '0.9rem', fontWeight: '600' }}>FOR Agent</div>
                            <div style={{ fontSize: '0.75rem', color: 'var(--color-text-muted)' }}>Gemini 2.5 Flash</div>
                          </div>
                        </div>
                        <span className="badge badge-for">Proponent</span>
                      </div>
                      
                      <div className="speech-bubble-list">
                        {displayedRounds.map((r, idx) => (
                          <div key={idx} className="speech-bubble for-type">
                            <div className="bubble-meta">
                              <span>Round {idx + 1}</span>
                              <span>Argued</span>
                            </div>
                            <p dangerouslySetInnerHTML={{ __html: r.for }}></p>
                          </div>
                        ))}
                        
                        {activeAgent === "FOR" && (
                          <div className="thinking-placeholder">
                            <Icons.Search />
                            <span>Gemini is researching and drafting rebuttal</span>
                            <div className="dot-typing"><span></span><span></span><span></span></div>
                          </div>
                        )}
                      </div>
                    </div>

                    {/* AGAINST AGENT COLUMN */}
                    <div className={`glass-panel ${activeAgent === "AGAINST" ? "pulse-against" : ""}`}>
                      <div className="column-header">
                        <div className="avatar-wrapper">
                          <div className="agent-avatar avatar-against">L</div>
                          <div>
                            <div style={{ fontSize: '0.9rem', fontWeight: '600' }}>AGAINST Agent</div>
                            <div style={{ fontSize: '0.75rem', color: 'var(--color-text-muted)' }}>Llama 3.3 70B</div>
                          </div>
                        </div>
                        <span className="badge badge-against">Opponent</span>
                      </div>

                      <div className="speech-bubble-list">
                        {displayedRounds.map((r, idx) => r.against && (
                          <div key={idx} className="speech-bubble against-type">
                            <div className="bubble-meta">
                              <span>Round {idx + 1}</span>
                              <span>Argued</span>
                            </div>
                            <p dangerouslySetInnerHTML={{ __html: r.against }}></p>
                          </div>
                        ))}

                        {activeAgent === "AGAINST" && (
                          <div className="thinking-placeholder">
                            <Icons.Search />
                            <span>Llama is searching files and formulating response</span>
                            <div className="dot-typing"><span></span><span></span><span></span></div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Verdict presentation */}
                  {verdict && (
                    <div className="glass-panel verdict-backdrop">
                      <div className="verdict-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                          <Icons.Gavel style={{ color: 'var(--color-judge)' }} />
                          <span style={{ fontSize: '1.2rem', fontWeight: '700', fontFamily: 'var(--font-title)' }}>Court Adjudication Verdict</span>
                        </div>
                        <span className="badge badge-judge">DEEPSEEK R1 JUDGE</span>
                      </div>
                      
                      <div className="verdict-score-ring-row">
                        <div className="score-circle-container">
                          <div className="score-gauge-big" style={{ borderColor: 'var(--color-for)' }}>
                            <span className="score-value-big" style={{ color: 'var(--color-for)' }}>{verdict.for_score}</span>
                          </div>
                          <span className="gauge-label">FOR Score</span>
                        </div>

                        <div style={{ borderLeft: '1px solid var(--border-color)', height: '80px', margin: 'auto 0' }}></div>

                        <div className="score-circle-container">
                          <div className="score-gauge-big" style={{ borderColor: 'var(--color-judge)' }}>
                            <span className="score-value-big" style={{ color: 'var(--color-judge)' }}>{verdict.verdict.includes("FOR") ? "FOR" : verdict.verdict.includes("AGAINST") ? "AGN" : "DRAW"}</span>
                          </div>
                          <span className="gauge-label">Winner</span>
                        </div>

                        <div style={{ borderLeft: '1px solid var(--border-color)', height: '80px', margin: 'auto 0' }}></div>

                        <div className="score-circle-container">
                          <div className="score-gauge-big" style={{ borderColor: 'var(--color-against)' }}>
                            <span className="score-value-big" style={{ color: 'var(--color-against)' }}>{verdict.against_score}</span>
                          </div>
                          <span className="gauge-label">AGAINST Score</span>
                        </div>
                      </div>

                      <div style={{ padding: '24px' }}>
                        <div style={{ marginBottom: '16px' }}>
                          <strong style={{ display: 'block', fontSize: '0.9rem', color: 'var(--color-text-muted)', textTransform: 'uppercase', marginBottom: '6px' }}>
                            Verdict Decision
                          </strong>
                          <p style={{ fontSize: '1.15rem', fontWeight: '600', color: '#fff' }}>{verdict.verdict}</p>
                        </div>

                        <div style={{ marginBottom: '20px' }}>
                          <strong style={{ display: 'block', fontSize: '0.9rem', color: 'var(--color-text-muted)', textTransform: 'uppercase', marginBottom: '6px' }}>
                            Reasoning Assessment
                          </strong>
                          <p style={{ fontSize: '0.95rem', color: 'var(--color-text)', lineHeight: '1.6' }}>{verdict.reasoning}</p>
                        </div>

                        {verdict.fallacies_detected.length > 0 && (
                          <div>
                            <strong style={{ display: 'block', fontSize: '0.9rem', color: 'var(--color-text-muted)', textTransform: 'uppercase', marginBottom: '6px' }}>
                              Fallacies Flagged By Judge
                            </strong>
                            <div className="fallacy-tag-row">
                              {verdict.fallacies_detected.map((f, idx) => (
                                <div key={idx} className="fallacy-badge-tag">
                                  <span>{f.agent}: <strong>{f.name}</strong></span>
                                  <span style={{ fontSize: '0.75rem', opacity: 0.8 }}>({f.detail})</span>
                                </div>
                              ))}
                            </div>
                            <span style={{ display: 'block', fontSize: '0.75rem', color: 'var(--color-text-muted)', marginTop: '8px' }}>
                              * Hover over the underlined text in the transcript columns above to see fallacy descriptions.
                            </span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {activeAgent === "JUDGE" && !verdict && (
                    <div className="glass-panel pulse-judge" style={{ padding: '24px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '16px', marginTop: '24px' }}>
                      <Icons.Scale style={{ color: 'var(--color-judge)' }} />
                      <div style={{ textAlign: 'center' }}>
                        <h4 style={{ color: '#fff' }}>Judge Agent is Adjudicating</h4>
                        <p style={{ fontSize: '0.85rem', color: 'var(--color-text-muted)', marginTop: '4px' }}>
                          DeepSeek R1 is parsing all arguments for logical fallacies and evaluating fact points...
                        </p>
                      </div>
                      <div className="dot-typing"><span></span><span></span><span></span></div>
                    </div>
                  )}

                  {/* Back button */}
                  <div style={{ marginTop: '24px', display: 'flex', gap: '12px' }}>
                    <button className="btn btn-secondary" onClick={resetDebate} disabled={activeAgent !== "" && !verdict}>
                      <Icons.RefreshCw />
                      <span>Start New Debate</span>
                    </button>
                  </div>
                </div>

                {/* Sidebar Logs */}
                <div className="glass-panel" style={{ padding: '20px', position: 'sticky', top: '24px' }}>
                  <div className="control-title">
                    <Icons.Cpu />
                    <span>Real-Time Logs</span>
                  </div>
                  
                  <div className="log-panel">
                    {logs.map((log, idx) => (
                      <div key={idx} className="log-entry">
                        <span className="log-timestamp">[{log.timestamp}]</span>
                        <span className={`log-text-${log.type}`}>{log.text}</span>
                      </div>
                    ))}
                    <div ref={logEndRef} />
                  </div>

                  <div style={{ marginTop: '20px', borderTop: '1px solid var(--border-color)', paddingTop: '16px', fontSize: '0.8rem' }}>
                    <strong style={{ color: 'var(--color-text-muted)', display: 'block', marginBottom: '8px' }}>
                      DEBATER STATS
                    </strong>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span>Gemini (FOR):</span>
                        <span style={{ color: 'var(--color-for)' }}>{displayedRounds.length} rounds active</span>
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span>Llama (AGAINST):</span>
                        <span style={{ color: 'var(--color-against)' }}>{displayedRounds.filter(r => r.against).length} rounds active</span>
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <span>Round Limit:</span>
                        <span>{numRounds} rounds max</span>
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
